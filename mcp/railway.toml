[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"
watchPatterns = ["mcp/**"]

[deploy]
startCommand = "npm run start:http"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production.deploy]
numReplicas = 1
